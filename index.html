<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Hub | 全球頂尖迷因與病毒式傳播排行榜</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-base: #070709;
            --bg-surface: rgba(18, 18, 24, 0.8);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --brand-primary: linear-gradient(135deg, #ff3366 0%, #ff5e3a 100%);
            --brand-success: #00e676;
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
            --shadow-luxury: 0 20px 40px rgba(0, 0, 0, 0.7);
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 全域重設與效能優化 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            background-color: var(--bg-base); 
            color: var(--text-primary); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 頂級極光環境光特效 */
        body::before {
            content: '';
            position: absolute;
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 51, 102, 0.12) 0%, transparent 65%);
            z-index: -1;
            pointer-events: none;
        }

        /* 客製化現代滾動條 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }

        /* 導覽與標頭層 */
        header { 
            padding: 80px 0 40px 0; 
            text-align: center; 
            max-width: 600px;
            width: 90%;
        }

        header .badge {
            background: rgba(255, 51, 102, 0.1);
            color: #ff3366;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 51, 102, 0.2);
        }

        header h1 {
            font-size: 2.75rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 12px;
            background: linear-gradient(180deg, #ffffff 0%, #a1a1a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 1.05rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* 主容器 */
        .container { 
            max-width: 640px; 
            width: 92%; 
            padding-bottom: 80px;
        }

        /* 卡片組件：標準高階玻璃擬真 */
        .meme-card { 
            position: relative;
            background: var(--bg-surface); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-subtle); 
            border-radius: 24px; 
            padding: 24px; 
            margin-bottom: 30px; 
            box-shadow: var(--shadow-luxury);
            will-change: transform, box-shadow;
            transition: var(--transition-smooth);
        }

        .meme-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 40px rgba(255, 51, 102, 0.05);
        }

        /* 競賽排名標籤 */
        .rank-tag {
            position: absolute;
            top: 24px;
            left: 24px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 圖像容器優化（防止佈局偏移 CLS） */
        .meme-viewport {
