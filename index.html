    <style>
        :root {
            --bg-base: #070709;
            --bg-surface: rgba(18, 18, 24, 0.8);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --brand-primary: linear-gradient(135deg, #ff3366 0%, #ff5e3a 100%);
            --brand-success: #00e676;
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
            --shadow-luxury: 0 20px 40px rgba(0, 0, 0, 0.7);
        }

        /* 全域重設與效能優化 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            background-color: var(--bg-base); 
            color: var(--text-primary); 
            font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: absolute;
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 51, 102, 0.12) 0%, transparent 65%);
            z-index: -1;
            pointer-events: none;
        }

        header { 
            padding: 80px 0 40px 0; 
            text-align: center; 
            max-width: 600px;
            width: 90%;
        }

        header .badge {
            background: rgba(255, 51, 102, 0.1);
            color: #ff3366;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 51, 102, 0.2);
        }

        header h1 {
            font-size: 2.75rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 12px;
            background: linear-gradient(180deg, #ffffff 0%, #a1a1a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 1.05rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .container { 
            max-width: 640px; 
            width: 92%; 
            padding-bottom: 80px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .section-header i { color: #ff3366; }

        /* 排行榜卡片組件 */
        .meme-card { 
            position: relative;
            background: var(--bg-surface); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-subtle); 
            border-radius: 24px; 
            padding: 24px; 
            margin-bottom: 30px; 
            box-shadow: var(--shadow-luxury);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s ease;
        }

        .meme-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
        }
