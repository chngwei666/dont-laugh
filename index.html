<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Hub | 每兩週精選爆笑排行榜</title>
    <style>
        :root {
            --bg-deep: #0f0f12;
            --card-glass: rgba(30, 30, 35, 0.7);
            --text-main: #f8f9fa;
            --text-sub: #a0a0a5;
            --btn-grad: linear-gradient(135deg, #ff416c, #ff4b2b);
        }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { padding: 40px 0; text-align: center; }
        .container { max-width: 800px; width: 90%; }
        .meme-card { background: var(--card-glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 24px; margin-bottom: 30px; }
        .meme-img { width: 100%; border-radius: 16px; margin-bottom: 20px; }
        .vote-btn { background: var(--btn-grad); border: none; color: white; padding: 15px 30px; border-radius: 50px; cursor: pointer; width: 100%; font-size: 1.1rem; }
    </style>
</head>
<body>

<header>
    <h1>🔥 Meme Hub 精選</h1>
    <p style="color:var(--text-sub)">每兩週更新，捕捉你的笑點</p>
</header>

<div class="container" id="meme-container"></div>

<script>
    const memeData = [
        {
            title: "TikTok 精選",
            imgUrl: "https://p16-comment-sign-sg.tiktokcdn.com/tos-alisg-i-zt8igodiya-sg/8fdc61dd7228454eb217a9a5caf035b5~tplv-jj85edgx6n-image-medium.jpeg?dr=8569&refresh_token=bf361e5c&x-expires=1782306000&x-signature=VgVuUcOf07ra4beC7OuYpIexTeA%3D&t=67a6c45e&ps=a0626fcd&shp=ff37627b&shcp=ff37627b&idc=my",
            heat: 2850
        },
        {
            title: "Imgur 網友分享",
            imgUrl: "https://i.imgur.com/W4XdfyR_d.webp?maxwidth=520&shape=thumb&fidelity=high",
            heat: 2100
        },
        {
            title: "Facebook 精選",
            imgUrl: "https://scontent-tpe1-1.xx.fbcdn.net/v/t39.30808-6/705122885_1580248270330103_7938124730336629191_n.jpg?stp=dst-jpg_p526x296_tt6&_nc_cat=108&ccb=1-7&_nc_sid=127cfc&_nc_ohc=qpAPk4p_USgQ7kNvwHVUPeT&_nc_oc=AdrQZ3J1c66HrP5BwuPTiG_naJ8NOUKL8xKSBxULQViB_fLCC51yu1qcqqN6InDx9pSg4oNYKm233BWcOYNFLcKU&_nc_zt=23&_nc_ht=scontent-tpe1-1.xx&_nc_gid=l9KN6LwrL93kGL_oSlsWcA&_nc_ss=7b2a8&oh=00_Af6He7FEU1-qhfVC-klrZeNtaGzTPajYvwSWBCa8YjUBrg&oe=6A1A25CF",
            heat: 1850
        }
    ];

    const container = document.getElementById('meme-container');
    memeData.forEach((item) => {
        container.innerHTML += `
            <div class="meme-card">
                <img src="${item.imgUrl}" class="meme-img" alt="${item.title}">
                <div class="content-area">
                    <h3>${item.title}</h3>
                    <p>目前熱度: ${item.heat} 🔥</p>
                    <button class="vote-btn" onclick="alert('感謝你的認同！')">UPVOTE THIS MASTERPIECE</button>
                </div>
            </div>
        `;
    });
</script>

</body>
</html>
