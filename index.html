<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Hub | 每兩週精選爆笑排行榜</title>
    <style>
        :root {
            --bg-deep: #0f0f12;
            --card-glass: rgba(30, 30, 35, 0.7);
            --text-main: #f8f9fa;
            --text-sub: #a0a0a5;
            --btn-grad: linear-gradient(135deg, #ff416c, #ff4b2b);
        }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { padding: 40px 0; text-align: center; }
        .container { max-width: 800px; width: 90%; }
        .meme-card { background: var(--card-glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 24px; margin-bottom: 30px; }
        .meme-img { width: 100%; border-radius: 16px; margin-bottom: 20px; display: block; }
        .vote-btn { background: var(--btn-grad); border: none; color: white; padding: 15px 30px; border-radius: 50px; cursor: pointer; width: 100%; font-size: 1.1rem; transition: 0.3s; }
        .vote-btn:hover { transform: scale(1.02); }
    </style>
</head>
<body>

<header>
    <h1>🔥 Meme Hub 精選</h1>
    <p style="color:var(--text-sub)">每兩週更新，捕捉你的笑點</p>
</header>

<div class="container" id="meme-container"></div>

<script>
    // 使用您指定的去浮水印後圖片連結
    const memeData = [
        { 
            title: "百年難得一見的古董", 
            imgUrl: "http://googleusercontent.com/image_generation_content/1", 
            heat: 5820 
        }
    ];

    const container = document.getElementById('meme-container');

    memeData.forEach((item) => {
        const card = document.createElement('div');
        card.className = 'meme-card';
        
        card.innerHTML = `
            <img src="${item.imgUrl}" class="meme-img" alt="${item.title}">
            <div class="content-area">
                <h3>${item.title}</h3>
                <p>目前熱度: <span class="heat-count">${item.heat}</span> 🔥</p>
                <button class="vote-btn">UPVOTE THIS MASTERPIECE</button>
            </div>
        `;

        const btn = card.querySelector('.vote-btn');
        const heatSpan = card.querySelector('.heat-count');
        
        btn.addEventListener('click', () => {
            item.heat++;
            heatSpan.textContent = item.heat;
            btn.textContent = "感謝你的認同！";
            btn.style.opacity = "0.7";
        });

        container.appendChild(card);
    });
</script>

</body>
</html>
